{% extends "base.html" %}

{% block title %}Contact Us - Cenas Kitchen{% endblock %}

{% block content %}
<section class="contact-hero">
  <div class="contact-wrapper">

    <!-- Contact Info Box -->
    <div class="contact-info-box">
      <h2>Get In Touch</h2>
      <p>We'd love to hear from you! Whether it's a question, comment, or a special request — our team is here for you.</p>
      <img src="{{ url_for('static', filename='images/email.png') }}" alt="Email">
    </div>

    <!-- Contact Form Box -->
    <div class="contact-form-box">
<form action="https://formspree.io/f/mgvlqywb" method="POST">
  <label for="name">Name</label>
  <input type="text" id="name" name="name" required />

  <label for="email">Email</label>
  <input type="email" id="email" name="email" required />

  <label for="message">Message</label>
  <textarea id="message" name="message" rows="5" required></textarea>

  <button type="submit">Send Message</button>
</form>

    </div>

  </div>
</section>
{% endblock %}
